"$schema" = "node_modules/wrangler/config-schema.json"
name = "azarapp-v2"
main = "src/worker.js"
compatibility_date = "2026-05-30"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[migrations]]
tag = "v1"
new_classes = ["Room"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
